# .readthedocs.yaml

version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    # You can also specify other tool versions:
    # nodejs: "19"
    # rust: "1.64"
    # golang: "1.19"

# 这样就可以使用mkdocs的主题了
mkdocs:
  configuration: mkdocs.yml  # MkDocs 配置文件路径
  #configuration: mkdocs.readthedocs.yml  # MkDocs 配置文件路径

# Optionally build your docs in additional formats such as PDF and ePub
# formats:
#    - pdf
#    - epub

python:
  # 在这里填写mkdocs的主题了
  install:
   - requirements: docs/requirements.txt

