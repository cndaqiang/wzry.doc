# .readthedocs.yaml
version: 2

# 设置操作系统、Python 版本和工具
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  
  # 配置构建命令
  commands:
    - pip install -r requirements.txt  # 安装所有依赖
    - python generate_robots.py  # 执行脚本生成 robots.txt
    - mkdocs build  # 执行 mkdocs 构建文档

# 配置 Python 环境
python:
  install:
    - requirements: requirements.txt  # 确保安装 mkdocs 和其他依赖
