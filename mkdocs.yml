site_name: WZRY
# 添加url后也会自动生成sitemap.xml，github的push地址
site_url: https://cndaqiang.github.io/wzry.doc
# 主题右上角显示的repo地址，可以设置为开源项目地址
repo_url: https://github.com/cndaqiang/WZRY
repo_name: 'cndaqiang/WZRY' # 只是右上角显示的文字内容
# repo的start信息，在gh的page上会显示，本地url不会显示。
#repo_name: cndaqiang/WZRY

nav:
    - 项目介绍: index.md
    - 使用手册:
      - 安装指南: guide/install.md
      - 配置文件: guide/config.md
      - 高级功能: guide/file.md
      - "&nbsp;■&nbsp;对战模式": guide/duizhanmoshi.md
      - "&nbsp;■&nbsp;礼包功能": guide/libao.md
      - "&nbsp;■&nbsp;选择英雄": guide/shuliandu.md
      - 组队教程: guide/zudui.md
      - 更新资源: guide/upfig.md
      - 图文教程: guide/tuwen.md
    - 常见问题: QA.md
    - 提出问题: https://github.com/cndaqiang/WZRY/issues
    - 经验分享: 
      - 战令: exp/zhanling.md
      - 模拟器: exp/moniqi.md
      - 怎么控制苹果手机: https://cndaqiang.github.io/2023/11/10/MobileAuto/
      - 多账户使用同一个控制文件: exp/link.md
      - 定时执行脚本: exp/dingshi.md
    - 关于:
      - 更新日志: about/update.md
      - 许可: about/license.md
theme:
#  name: gitbook
  name: material
  # 网站的logo
  favicon: fig/favicon.jpg
  # 主题页面的log
  logo: fig/favicon.ico
  icon:
    repo: fontawesome/brands/github  

# markdown拓展语法
markdown_extensions:
  - admonition #MkDocs 警告框， 语法https://lifeinzucc.github.io/help/markdown/admonition/
  - footnotes #脚注
  - meta #自定义文章元数据
  - pymdownx.caret #下划线
  - pymdownx.mark #文本高亮
  - pymdownx.tilde #删除线
#  - toc: # 大纲
#      permalink: true
#      slugify: !!python/name:pymdownx.slugs.uslugify

#需要转换网站上的js到本地，网页统计
extra_javascript:
  - javascripts/umami.tongji.js

google_analytics:
  - UA-109057291-1
  - auto

extra:
  # https://mkdoc-material.llango.com/setup/setting-up-the-footer/
  # https://fontawesome.com/search?q=blog&o=r&f=classic
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cndaqiang
    - icon: fontawesome/brands/python
      link: https://github.com/cndaqiang/WZRY
    - icon: fontawesome/solid/square-rss
      link: https://cndaqiang.github.io/wzry.doc/sitemap.xml
    - icon: fontawesome/solid/chart-area
      link: https://cloud.umami.is/share/YHbP7dG7wOyJTdBg/cndaqiang.github.io
  footer: |
    <div style="text-align: center;">
      <a href="https://example.com" target="_blank">点击这里以访问示例链接</a>
    </div>

# 中文搜索
# https://cloud-atlas.readthedocs.io/zh-cn/latest/devops/docs/mkdocs/mkdocs_chinese_search.html
plugins:
    - search:
        lang:
            - en
            - ja
        separator: '[\s\-\.]+'